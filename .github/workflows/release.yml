name: Release

on:
  release:
    types: [ published ]

permissions:
  contents: write
  packages: write

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/micos-2024
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
      continue-on-error: true

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name == 'release' }}
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/micos-2024:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/micos-2024:${{ github.event.release.tag_name }}
      continue-on-error: true

  github-release:
    name: Update GitHub Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Generate Release Notes
      id: notes
      run: |
        if [ -f CHANGELOG.md ]; then
          # Extract latest version notes
          sed -n '/^## \[.*\]/,/^## \[.*\]/p' CHANGELOG.md | head -n -1 > release_notes.md
        else
          echo "Release version ${{ github.event.release.tag_name }}" > release_notes.md
        fi

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*.whl
          dist/*.tar.gz
        body_path: release_notes.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
