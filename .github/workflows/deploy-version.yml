# =============================================================================
# 版本化文档部署工作流
# 用于管理多个版本文档的发布
# =============================================================================

name: 🏷️ Deploy Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.2.0)'
        required: true
        default: ''
      alias:
        description: '别名设置 (例如: stable 或 latest)'
        required: false
        default: 'stable'
        type: choice
        options:
          - stable
          - latest
          - ''
      
jobs:
  deploy-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install \
            mkdocs-material \
            mkdocs-material-extensions \
            mkdocs-minify-plugin \
            mkdocs-git-revision-date-localized-plugin \
            mike

      - name: 🔧 Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🏷️ Deploy Version with Mike
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ALIAS="${{ github.event.inputs.alias }}"
          
          echo "🚀 Deploying version: $VERSION"
          
          if [ -n "$ALIAS" ]; then
            mike deploy --push --update-aliases "$VERSION" "$ALIAS"
            echo "🏷️ Tagged $VERSION with alias: $ALIAS"
          else
            mike deploy --push "$VERSION"
            echo "🏷️ Deployed $VERSION without alias"
          fi
          
          # 列出所有版本
          echo "📋 Current versions:"
          mike list

      - name: 🌐 Update Default Version
        if: github.event.inputs.alias == 'stable'
        run: |
          mike set-default --push "${{ github.event.inputs.version }}"
          echo "✅ Set ${{ github.event.inputs.version }} as default"

      - name: 📊 Version Summary
        run: |
          echo "================================"
          echo "📦 Deployment Summary"
          echo "================================"
          echo "Version: ${{ github.event.inputs.version }}"
          echo "Alias: ${{ github.event.inputs.alias }}"
          echo "URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "================================"
