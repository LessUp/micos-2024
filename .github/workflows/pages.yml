# =============================================================================
# GitHub Pages 部署工作流 - 最强配置
# 支持：自动部署、版本管理(mike)、多语言、缓存优化
# =============================================================================

name: 🚀 Deploy GitHub Pages

on:
  # 主分支推送时触发
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/pages.yml'
  
  # Release 发布时触发
  release:
    types: [published]
  
  # 支持手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空使用当前分支)'
        required: false
        default: ''
      alias:
        description: '别名 (stable/latest)'
        required: false
        default: ''
      deploy:
        description: '是否部署'
        required: false
        default: 'true'

# 权限配置
permissions:
  contents: write
  pages: write
  id-token: write

# 并发控制
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # 构建阶段
  # ===========================================================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 完整历史用于 git-revision-date 插件
          submodules: recursive

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements-docs.txt
            requirements.txt

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel
          
          # 安装 MkDocs 和 Material 主题
          pip install \
            mkdocs-material \
            mkdocs-material-extensions \
            mkdocs-minify-plugin \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-glightbox \
            mkdocs-git-committers-plugin-2 \
            mkdocs-sitemap-plugin \
            mike

      - name: 🔍 Setup Pages
        uses: actions/configure-pages@v6

      - name: 🎨 Materialize Social Cards
        run: |
          # 预生成社交分享卡片
          mkdocs build --config-file mkdocs.yml
        env:
          CI: true

      - name: 📊 Calculate Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ] || [ "${{ github.ref }}" == "refs/heads/master" ]; then
            VERSION="dev"
          else
            VERSION="${{ github.ref_name }}"
          fi
          
          # 去除 v 前缀用于排序
          VERSION_CLEAN="${VERSION#v}"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_clean=$VERSION_CLEAN" >> $GITHUB_OUTPUT
          echo "📌 Version: $VERSION (clean: $VERSION_CLEAN)"

      - name: 🏗️ Build with MkDocs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # 使用 mike 部署到 gh-pages
          # mike 会自动处理版本管理和 aliases
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 部署版本
          echo "🚀 Deploying version: $VERSION"
          mike deploy \
            --push \
            --update-aliases \
            "$VERSION" \
            ${{ github.event.inputs.alias || '' }}
          
          # 设置默认版本（如果是 main/master 分支）
          if [ "$VERSION" == "dev" ]; then
            echo "📌 Setting default version to $VERSION"
            mike set-default --push "$VERSION" || true
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔗 Fix permissions
        run: |
          chmod -c -R +rX "site/" || true

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
          retention-days: 1

  # ===========================================================================
  # 部署阶段
  # ===========================================================================
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # ===========================================================================
  # 状态通知
  # ===========================================================================
  notify:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()
    steps:
      - name: ✅ Success Notification
        if: needs.build.result == 'success' && needs.deploy.result == 'success'
        run: |
          echo "🎉 GitHub Pages deployed successfully!"
          echo "🌐 URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          
      - name: ❌ Failure Notification
        if: needs.build.result == 'failure' || needs.deploy.result == 'failure'
        run: |
          echo "💥 GitHub Pages deployment failed!"
          echo "Please check the logs above for details."
