# =============================================================================
# GitHub Pages 清理工作流 - 定期清理旧版本
# =============================================================================

name: 🧹 Cleanup Old Versions

on:
  schedule:
    # 每月运行一次
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      keep_versions:
        description: '保留的最新版本数量'
        required: false
        default: '5'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install mike
        run: pip install mike

      - name: 🔍 List current versions
        run: |
          echo "当前所有版本:"
          mike list

      - name: 🧹 Cleanup old versions
        run: |
          KEEP_VERSIONS="${{ github.event.inputs.keep_versions || '5' }}"
          
          echo "保留最新的 $KEEP_VERSIONS 个版本"
          
          # 获取所有版本（排除别名）
          versions=$(mike list | grep -v " (alias)" | tail -n +$((KEEP_VERSIONS + 1)))
          
          if [ -n "$versions" ]; then
            echo "将删除以下版本:"
            echo "$versions"
            
            # 删除旧版本
            for version in $versions; do
              echo "删除: $version"
              mike delete "$version" || true
            done
          else
            echo "没有需要删除的旧版本"
          fi

      - name: 📊 List remaining versions
        run: |
          echo "清理后的版本:"
          mike list

      - name: 🚀 Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin gh-pages
