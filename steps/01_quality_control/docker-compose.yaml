# MICOS-2024 Quality Control Docker Compose
# 使用环境变量配置路径，避免硬编码
#
# 使用方法:
#   export RAW_DATA=/path/to/raw_data
#   export RESULT_DATA=/path/to/results
#   export MANUAL_DATA=/path/to/manual
#   export REFERENCE_DATA=/path/to/reference
#   docker-compose up

services:
  fastqc:
    image: biocontainers/fastqc:v0.11.9_cv8
    container_name: fastqc
    command:
      [
        "fastqc",
        "/RawData/${SAMPLE_NAME}_1.fastq",
        "/RawData/${SAMPLE_NAME}_2.fastq"
      ]
    volumes:
      - ${RAW_DATA:-./data/raw}:/RawData
      - ${RESULT_DATA:-./results}:/ResultData
      - ${MANUAL_DATA:-./manual}:/ManualData
      - ${REFERENCE_DATA:-./reference}:/ReferenceData
    working_dir: /
    user: "${UID:-1000}:${GID:-1000}"
    restart: no

volumes:
  RawData:
    driver: local
  ResultData:
    driver: local
  ManualData:
    driver: local
  ReferenceData:
    driver: local
